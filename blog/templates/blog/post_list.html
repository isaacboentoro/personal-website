{% extends "blog/base.html" %}

{% block title %}Blog{% endblock %}

{% block content %}
  {% for post in posts %}
    <div class="post-entry">
      <div class="label post-title">
        {% if post.private %}<span class="private-badge">private</span>{% endif %}
        <a href="{{ post.get_absolute_url }}">{{ post.title }}</a>
      </div>
      <div class="label post-time">{{ post.created_at|date:"F j, Y" }}</div>
    </div>
  {% empty %}
    <div class="label">No posts yet.</div>
  {% endfor %}
{% endblock %}
