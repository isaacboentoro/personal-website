{% load static %}
<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>isaac b.</title>
        <style>
            :root {
                --bg: #eee;
                --img-w: 1280px</title>;
                --img-h: 853px;
                --art: url("{% static 'landing-1.jpg' %}");
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--bg);
                overflow: hidden;
            }

            .parallax-stage {
                position: relative;
                width: var(--img-w);
                height: var(--img-h);
                max-width: 90vw;
                aspect-ratio: 1280 / 853;
            }

            .layer {
                position: absolute;
                background-image: var(--art);
                background-size: var(--img-w) var(--img-h);
                will-change: transform;
            }

            .layer-base {
                inset: 0;
            }

            /* Overlay labels */
            .overlay {
                position: fixed;
                top: 100px;
                left: 0;
                width: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: column;
                padding: 0 12px;
                z-index: 10;
                pointer-events: none;
            }
            .overlay a {
                pointer-events: auto;
            }
            .container {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                width: 100%;
                max-width: 500px;
            }
            .label {
                display: inline-block;
                background: #fff;
                margin-bottom: 9px;
                color: #000;
            }
            .label-group {
                margin-top: 44px;
            }
            .label-group .label {
                margin-bottom: 0;
            }
            .label-group .label + .label {
                margin-top: 9px;
            }
            .title {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                font-size: 2em;
                font-weight: 200;
                line-height: 1.15;
            }
            .subtitle {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                font-weight: 200;
                font-size: 17px;
            }
            .link {
                color: #000;
                text-decoration: none;
                border-bottom: 1px solid #000;
                padding-bottom: 1px;
            }
            .link:hover {
                border-bottom-width: 2px;
            }

            @media (max-width: 1024px) {
                .parallax-stage {
                    max-width: 100vw;
                    aspect-ratio: 1280 / 853;
                }
                .overlay {
                    top: 40px;
                }
                .title {
                    font-size: 1.6em;
                }
                .subtitle {
                    font-size: 15px;
                }
                .container {
                    padding: 0 16px;
                }
            }

            @media (max-width: 640px) {
                .parallax-stage {
                    max-width: 100vw;
                    aspect-ratio: 4 / 3;
                }
                .overlay {
                    top: 24px;
                }
                .title {
                    font-size: 1.35em;
                }
                .subtitle {
                    font-size: 14px;
                }
                .label {
                    margin-bottom: 6px;
                }
                .label-group {
                    margin-top: 22px;
                }
            }
        </style>

        <script>
            var stage = document.getElementById("stage");

            // Clone each fragment into ghost trails
            var fragments = Array.from(stage.querySelectorAll(".layer[style]"));
            fragments.forEach(function (el) {
                var d = parseFloat(el.dataset.depth) || 1;

                var g1 = el.cloneNode();
                g1.style.opacity = "0.3";
                g1.style.pointerEvents = "none";
                g1.dataset.depth = String(d * 1.5);
                el.parentNode.insertBefore(g1, el);

                var g2 = el.cloneNode();
                g2.style.opacity = "0.12";
                g2.style.pointerEvents = "none";
                g2.dataset.depth = String(d * 2.2);
                el.parentNode.insertBefore(g2, g1);
            });

            var layers = Array.from(stage.querySelectorAll(".layer"));
            var state = layers.map(function () {
                return { target: 0, current: 0 };
            });
            var targetNorm = 0;

            function setTarget(y) {
                targetNorm = (y / window.innerHeight) * 2 - 1;
            }

            window.addEventListener("mousemove", function (e) {
                setTarget(e.clientY);
            });

            window.addEventListener(
                "touchmove",
                function (e) {
                    setTarget(e.touches[0].clientY);
                },
                { passive: true },
            );

            window.addEventListener(
                "touchstart",
                function (e) {
                    setTarget(e.touches[0].clientY);
                },
                { passive: true },
            );

            var STRENGTH = 40;
            var EASE = 0.08;

            function tick() {
                layers.forEach(function (el, i) {
                    var depth = parseFloat(el.dataset.depth) || 1;
                    state[i].target = targetNorm * STRENGTH * (depth - 1);
                    state[i].current +=
                        (state[i].target - state[i].current) * EASE;
                    el.style.transform =
                        "translate3d(0, " +
                        state[i].current.toFixed(2) +
                        "px, 0)";
                });
                requestAnimationFrame(tick);
            }

            tick();
        </script>
