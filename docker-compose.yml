services:
  app:
    build: .
    container_name: personal-website
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - ALLOWED_HOSTS=${DOMAIN}
      - CSRF_TRUSTED_ORIGINS=https://${DOMAIN}
    volumes:
      - app_db:/app/db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.personal-website.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.personal-website.tls.certresolver=letsencrypt"
      - "traefik.http.services.personal-website.loadbalancer.server.port=8000"

volumes:
  app_db:
